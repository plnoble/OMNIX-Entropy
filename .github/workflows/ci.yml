name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09

      - name: Set up .NET 8
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore ComputerSecuritySoftware.slnx

      - name: Build production binaries
        run: dotnet build ComputerSecuritySoftware.slnx --configuration Release --no-restore

      - name: Run full test suite
        run: dotnet test ComputerSecuritySoftware.slnx --configuration Debug --no-restore

      - name: Verify source integrity
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .omx/verify-source-integrity.ps1
